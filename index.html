<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFT Poster Color Space</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #292929, #0d0d0d 65%);
      color: #fff;
      padding: clamp(10px, 2.5vmin, 28px);
    }

    .nft-card {
      container-type: inline-size;
      /* Poster is 2:3; card ≈ poster + footer. Fit width and height of viewport, keep proportions. */
      --card-footer-h: 11.5rem;
      --body-pad-y: clamp(10px, 2.5vmin, 28px);
      width: min(
        min(92vw, 720px),
        calc((100dvh - 2 * var(--body-pad-y) - var(--card-footer-h)) * 2 / 3)
      );
      max-width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: clamp(10px, 2vmin, 16px);
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(6px);
    }

    .poster {
      width: 100%;
      display: grid;
      place-items: end start;
      aspect-ratio: 2 / 3;
      position: relative;
      overflow: hidden;
      padding: clamp(10px, 3.5cqw, 22px);
      transition: filter 0.4s ease, transform 0.4s ease;
    }

    .poster-grid {
      position: absolute;
      inset: 0;
      z-index: 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: clamp(1px, 0.45cqw, 3px);
    }

    .poster-tile {
      width: 100%;
      height: 100%;
      position: relative;
      background-size: 200% 200%;
      background-repeat: no-repeat;
      transition: filter 0.35s ease;
    }

    .poster-tint {
      position: absolute;
      inset: 0;
      z-index: 1;
      mix-blend-mode: color;
      opacity: 0.42;
      pointer-events: none;
      transition: opacity 0.35s ease;
    }

    .poster:hover {
      transform: scale(1.01);
    }

    .poster::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, transparent 45%, rgba(0, 0, 0, 0.6));
    }

    .poster-text {
      position: relative;
      z-index: 2;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
      line-height: 1.05;
      font-size: clamp(0.85rem, 6cqw + 0.35rem, 2.35rem);
      max-width: 90%;
      text-shadow: 0 8px 24px rgba(0, 0, 0, 0.55);
    }

    .content {
      padding: clamp(10px, 3cqw, 16px) clamp(12px, 3.5cqw, 18px) clamp(12px, 3.5cqw, 20px);
    }

    .title {
      margin: 0;
      font-size: clamp(0.95rem, 3.8cqw, 1.25rem);
      letter-spacing: 0.2px;
    }

    .meta {
      margin: 8px 0 2px;
      font-size: clamp(0.8rem, 2.8cqw, 0.98rem);
      opacity: 0.9;
    }

    .tag {
      display: inline-block;
      margin-top: 10px;
      padding: clamp(4px, 1.2cqw, 8px) clamp(8px, 2.2cqw, 12px);
      border-radius: 999px;
      font-size: clamp(0.72rem, 2.4cqw, 0.88rem);
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .original-toggle {
      display: block;
      width: 100%;
      margin-top: clamp(10px, 2.5cqw, 14px);
      padding: clamp(8px, 2.2cqw, 12px) clamp(10px, 2.8cqw, 16px);
      border-radius: 10px;
      font: inherit;
      font-size: clamp(0.82rem, 2.8cqw, 0.98rem);
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.35);
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .original-toggle:hover {
      background: rgba(255, 255, 255, 0.22);
      border-color: rgba(255, 255, 255, 0.5);
    }

    .original-toggle:focus-visible {
      outline: 2px solid #fff;
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <article class="nft-card">
    <section id="poster" class="poster" aria-label="AI generated inspired movie NFT poster">
      <div id="posterGrid" class="poster-grid" aria-label="Most watched movie poster split into sixteen pieces">
        <div class="poster-tile" data-piece="0"></div>
        <div class="poster-tile" data-piece="1"></div>
        <div class="poster-tile" data-piece="2"></div>
        <div class="poster-tile" data-piece="3"></div>
        <div class="poster-tile" data-piece="4"></div>
        <div class="poster-tile" data-piece="5"></div>
        <div class="poster-tile" data-piece="6"></div>
        <div class="poster-tile" data-piece="7"></div>
        <div class="poster-tile" data-piece="8"></div>
        <div class="poster-tile" data-piece="9"></div>
        <div class="poster-tile" data-piece="10"></div>
        <div class="poster-tile" data-piece="11"></div>
        <div class="poster-tile" data-piece="12"></div>
        <div class="poster-tile" data-piece="13"></div>
        <div class="poster-tile" data-piece="14"></div>
        <div class="poster-tile" data-piece="15"></div>
      </div>
      <div id="posterTint" class="poster-tint"></div>
      <div id="posterText" class="poster-text"></div>
    </section>
    <section class="content">
      <h1 id="movieTitle" class="title"></h1>
      <p id="watchCount" class="meta"></p>
      <span id="colorSpaceTag" class="tag"></span>
      <button type="button" id="toggleOriginalBtn" class="original-toggle" aria-pressed="false">
        View original poster colors
      </button>
    </section>
  </article>

  <script>
    const colorSpaces = [
      {
        name: "Barbie color space",
        // Bright pink, playful, high-saturation look inspired by pop romance posters.
        filter: "hue-rotate(310deg) saturate(1.85) brightness(1.18) contrast(1.12)",
        imageFilter: "hue-rotate(310deg) saturate(1.85) brightness(1.18) contrast(1.12)",
        tint: "linear-gradient(145deg, #ff4fa3, #ffd4ef)",
        palette: ["#ff4fa3", "#ff8cd9", "#ffdaf1", "#8f2cff"],
      },
      {
        name: "Oppenheimer color space",
        // Warm orange glow inspired by dramatic historical thrillers.
        filter: "hue-rotate(-24deg) saturate(1.35) brightness(0.9) contrast(1.35)",
        imageFilter: "hue-rotate(-24deg) saturate(1.35) brightness(0.9) contrast(1.35)",
        tint: "linear-gradient(160deg, #ff7b2e, #2b1412)",
        palette: ["#ff7b2e", "#68240f", "#1b1c22", "#ffc48a"],
      },
      {
        name: "Twilight color space",
        // Cool blue mood inspired by nocturnal fantasy romance posters.
        filter: "hue-rotate(155deg) saturate(0.72) brightness(0.9) contrast(1.06)",
        imageFilter: "hue-rotate(155deg) saturate(0.72) brightness(0.9) contrast(1.06)",
        tint: "linear-gradient(145deg, #5e8fb7, #1c2b43)",
        palette: ["#4f7fa6", "#18243b", "#8aa7bf", "#dce6f0"],
      },
    ];

    const getRandomItem = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const FALLBACK_POSTER_URL = "https://picsum.photos/900/1350";
    let currentPosterUrl = FALLBACK_POSTER_URL;
    const AUTO_SHUFFLE_INTERVAL_MS = 2000;
    const getCurrentMonthYear = () => {
      const now = new Date();
      return now.toLocaleString("en-US", { month: "long", year: "numeric" });
    };

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function buildOriginalPosterBackground(theme) {
      const [c1, c2, c3, c4] = theme.palette;
      const aX = randomInt(8, 88);
      const aY = randomInt(8, 88);
      const bX = randomInt(8, 88);
      const bY = randomInt(8, 88);
      const angle = randomInt(120, 240);
      const vignette = "radial-gradient(circle at center, transparent 44%, rgba(0,0,0,0.38) 100%)";

      return [
        `radial-gradient(circle at ${aX}% ${aY}%, ${c1} 0%, transparent 42%)`,
        `radial-gradient(circle at ${bX}% ${bY}%, ${c4} 0%, transparent 46%)`,
        `linear-gradient(${angle}deg, ${c2} 0%, ${c3} 100%)`,
        vignette,
      ].join(",");
    }

    async function getTopMovieThisMonth() {
      try {
        const response = await fetch("https://v1.connkt.art/api/movie-poster");
        const data = await response.json();
        return {
          title: data?.title || data?.movieTitle || "Most Watched This Month",
          posterUrl: data?.posterUrl || "",
        };
      } catch (_) {
        return {
          title: "Most Watched This Month",
          posterUrl: "",
        };
      }
    }

    function shuffle(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function applyPosterPieces(imageUrl) {
      currentPosterUrl = imageUrl;
      const tiles = Array.from(document.querySelectorAll(".poster-tile"));
      const cols = 4;
      const rows = 4;
      const positions = Array.from({ length: cols * rows }, (_, i) => {
        const col = i % cols;
        const row = Math.floor(i / cols);
        const x = (col / (cols - 1)) * 100;
        const y = (row / (rows - 1)) * 100;
        return `${x}% ${y}%`;
      });
      const shuffledOrder = shuffle(tiles.map((_, i) => i));
      tiles.forEach((tile, index) => {
        const sourcePiece = Number(tile.dataset.piece);
        tile.style.order = String(shuffledOrder[index]);
        tile.style.backgroundImage = `url("${imageUrl}")`;
        tile.style.backgroundSize = `${cols * 100}% ${rows * 100}%`;
        tile.style.backgroundPosition = positions[sourcePiece];
        tile.style.filter = originalColorsMode ? "none" : nftVisuals.imageFilter;
      });
    }

    function setPosterWithFallback(imageUrl) {
      const probe = new Image();
      probe.onload = () => applyPosterPieces(imageUrl);
      probe.onerror = () => applyPosterPieces(FALLBACK_POSTER_URL);
      probe.src = imageUrl;
    }

    let activeColorSpace = getRandomItem(colorSpaces);

    let originalColorsMode = false;

    const nftVisuals = {
      posterFilter: activeColorSpace.filter,
      posterBackground: buildOriginalPosterBackground(activeColorSpace),
      gridFilter: activeColorSpace.imageFilter,
      tintBackground: activeColorSpace.tint,
      imageFilter: activeColorSpace.imageFilter,
    };

    function pickDifferentColorSpace(current) {
      if (colorSpaces.length <= 1) return colorSpaces[0];
      let next;
      do {
        next = getRandomItem(colorSpaces);
      } while (next.name === current.name);
      return next;
    }

    function randomizeColorSpace() {
      activeColorSpace = pickDifferentColorSpace(activeColorSpace);
      nftVisuals.posterFilter = activeColorSpace.filter;
      nftVisuals.posterBackground = buildOriginalPosterBackground(activeColorSpace);
      nftVisuals.gridFilter = activeColorSpace.imageFilter;
      nftVisuals.tintBackground = activeColorSpace.tint;
      nftVisuals.imageFilter = activeColorSpace.imageFilter;
      syncPosterVisuals();
    }

    const posterElement = document.getElementById("poster");
    const posterGridElement = document.getElementById("posterGrid");
    const posterTintElement = document.getElementById("posterTint");
    const posterTextElement = document.getElementById("posterText");
    const movieTitleElement = document.getElementById("movieTitle");
    const watchCountElement = document.getElementById("watchCount");
    const colorSpaceTagElement = document.getElementById("colorSpaceTag");
    const toggleOriginalBtn = document.getElementById("toggleOriginalBtn");

    function setTileFilters(value) {
      document.querySelectorAll(".poster-tile").forEach((tile) => {
        tile.style.filter = value;
      });
    }

    function syncPosterVisuals() {
      if (originalColorsMode) {
        posterElement.style.filter = "none";
        posterElement.style.background = "#0a0a0a";
        posterGridElement.style.filter = "none";
        posterTintElement.style.background = nftVisuals.tintBackground;
        posterTintElement.style.opacity = "0";
        setTileFilters("none");
        colorSpaceTagElement.textContent = "Original poster colors";
        toggleOriginalBtn.textContent = "View NFT color space";
        toggleOriginalBtn.setAttribute("aria-pressed", "true");
      } else {
        posterElement.style.filter = nftVisuals.posterFilter;
        posterElement.style.background = nftVisuals.posterBackground;
        posterGridElement.style.filter = nftVisuals.gridFilter;
        posterTintElement.style.background = nftVisuals.tintBackground;
        posterTintElement.style.opacity = "0.42";
        setTileFilters(nftVisuals.imageFilter);
        colorSpaceTagElement.textContent = "NFT filter: " + activeColorSpace.name;
        toggleOriginalBtn.textContent = "View original poster colors";
        toggleOriginalBtn.setAttribute("aria-pressed", "false");
      }
    }

    posterTintElement.style.background = nftVisuals.tintBackground;
    syncPosterVisuals();

    (async () => {
      const movieFromApi = await getTopMovieThisMonth();
      const monthYear = getCurrentMonthYear();
      // Render immediately so user never sees an empty poster.
      applyPosterPieces(FALLBACK_POSTER_URL);

      // Replace with API poster only if it successfully loads.
      if (movieFromApi.posterUrl) setPosterWithFallback(movieFromApi.posterUrl);

      movieTitleElement.textContent = movieFromApi.title;
      posterTextElement.textContent = "NFT COLOR SPACE EDITION";
      watchCountElement.textContent = "Most watched in " + monthYear;

      setInterval(() => {
        if (document.visibilityState !== "visible") return;
        randomizeColorSpace();
        applyPosterPieces(currentPosterUrl);
      }, AUTO_SHUFFLE_INTERVAL_MS);
    })();

    toggleOriginalBtn.addEventListener("click", () => {
      originalColorsMode = !originalColorsMode;
      syncPosterVisuals();
    });

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
    }

    document.addEventListener("keydown", (e) => {
      if (e.key !== "f" && e.key !== "F") return;
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      e.preventDefault();
      toggleFullscreen();
    });
  </script>
</body>
</html>
