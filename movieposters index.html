<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NFT Poster Color Space</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #292929, #0d0d0d 65%);
      color: #fff;
      padding: 24px;
    }

    .nft-card {
      width: min(92vw, 420px);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(6px);
    }

    .poster {
      width: 100%;
      display: grid;
      place-items: end start;
      aspect-ratio: 2/3;
      position: relative;
      overflow: hidden;
      padding: 18px;
      transition: filter 0.4s ease, transform 0.4s ease;
    }

    .poster:hover {
      transform: scale(1.01);
    }

    .poster::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, transparent 45%, rgba(0, 0, 0, 0.6));
    }

    .poster-text {
      position: relative;
      z-index: 1;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
      line-height: 1.05;
      font-size: clamp(1.4rem, 6vw, 2.4rem);
      max-width: 90%;
      text-shadow: 0 8px 24px rgba(0, 0, 0, 0.55);
    }

    .content {
      padding: 14px 16px 18px;
    }

    .title {
      margin: 0;
      font-size: 1.2rem;
      letter-spacing: 0.2px;
    }

    .meta {
      margin: 8px 0 2px;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    .tag {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.85rem;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <article class="nft-card">
    <section id="poster" class="poster" aria-label="AI generated inspired movie NFT poster">
      <div id="posterText" class="poster-text"></div>
    </section>
    <section class="content">
      <h1 id="movieTitle" class="title"></h1>
      <p id="watchCount" class="meta"></p>
      <span id="colorSpaceTag" class="tag"></span>
    </section>
  </article>

  <script>
    const colorSpaces = [
      {
        name: "Barbie color space",
        // Bright pink, playful, high-saturation look inspired by pop romance posters.
        filter: "saturate(1.5) brightness(1.12) contrast(1.06)",
        palette: ["#ff4fa3", "#ff8cd9", "#ffdaf1", "#8f2cff"],
      },
      {
        name: "Oppenheimer color space",
        // Warm orange glow inspired by dramatic historical thrillers.
        filter: "saturate(1.2) brightness(0.9) contrast(1.3)",
        palette: ["#ff7b2e", "#68240f", "#1b1c22", "#ffc48a"],
      },
      {
        name: "Twilight color space",
        // Cool blue mood inspired by nocturnal fantasy romance posters.
        filter: "saturate(0.82) brightness(0.9) contrast(1.08)",
        palette: ["#4f7fa6", "#18243b", "#8aa7bf", "#dce6f0"],
      },
    ];

    const getRandomItem = (arr) => arr[Math.floor(Math.random() * arr.length)];
    const getCurrentMonthYear = () => {
      const now = new Date();
      return now.toLocaleString("en-US", { month: "long", year: "numeric" });
    };

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function buildOriginalPosterBackground(theme) {
      const [c1, c2, c3, c4] = theme.palette;
      const aX = randomInt(8, 88);
      const aY = randomInt(8, 88);
      const bX = randomInt(8, 88);
      const bY = randomInt(8, 88);
      const angle = randomInt(120, 240);
      const vignette = "radial-gradient(circle at center, transparent 44%, rgba(0,0,0,0.38) 100%)";

      return [
        `radial-gradient(circle at ${aX}% ${aY}%, ${c1} 0%, transparent 42%)`,
        `radial-gradient(circle at ${bX}% ${bY}%, ${c4} 0%, transparent 46%)`,
        `linear-gradient(${angle}deg, ${c2} 0%, ${c3} 100%)`,
        vignette,
      ].join(",");
    }

    async function getTopMovieThisMonthTitle() {
      try {
        const response = await fetch("https://v1.connkt.art/api/movie-poster");
        const data = await response.json();
        return data?.title || data?.movieTitle || "Most Watched This Month";
      } catch (_) {
        return "Most Watched This Month";
      }
    }

    const randomColorSpace = getRandomItem(colorSpaces);

    const posterElement = document.getElementById("poster");
    const posterTextElement = document.getElementById("posterText");
    const movieTitleElement = document.getElementById("movieTitle");
    const watchCountElement = document.getElementById("watchCount");
    const colorSpaceTagElement = document.getElementById("colorSpaceTag");

    posterElement.style.filter = randomColorSpace.filter;
    posterElement.style.background = buildOriginalPosterBackground(randomColorSpace);
    colorSpaceTagElement.textContent = "NFT filter: " + randomColorSpace.name;

    (async () => {
      const titleFromApi = await getTopMovieThisMonthTitle();
      const monthYear = getCurrentMonthYear();
      movieTitleElement.textContent = titleFromApi;
      posterTextElement.textContent = "ORIGINAL NFT EDITION";
      watchCountElement.textContent = "Most watched in " + monthYear + " (inspired artwork only)";
    })();
  </script>
</body>
</html>
